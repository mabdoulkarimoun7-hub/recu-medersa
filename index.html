<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

<title>Reçus — Médersa</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="assets/icon-192.png">
<link rel="icon" href="assets/icon-192.png">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<body>

<!-- ========== SPLASH MIDENTY (branding) ========== -->
<div id="splashMidenty" class="midenty-splash">
  <img src="assets/midenty-logo.png" alt="Midenty" class="midenty-splash-logo" id="midentyLogo">
  <div class="midenty-splash-message" id="midentyMessage">
    <p class="midenty-msg-ar" dir="rtl">مرحباً بكم في ميدنتي، تطبيق إدارة المؤسسات التعليمية</p>
    <p class="midenty-msg-fr">Bienvenue dans MIDENTY, l'application de gestion pour l'écosystème éducatif</p>
    <p class="midenty-msg-en">Welcome to MIDENTY, the management app for educational institutions</p>
  </div>
</div>

<!-- ========== SPLASH SCREEN ========== -->
<div id="splashScreen" class="splash-screen" style="visibility:hidden">
  <img alt="Logo" class="splash-logo" id="splashLogo" style="opacity:0;transition:opacity 0.3s">
  <div class="splash-name-ar" id="splashNameAr"></div>
  <div class="splash-name-fr" id="splashNameFr"></div>
</div>

<script>
(function(){
  var p = new URLSearchParams(window.location.search).get("c");
  var sp = document.getElementById("splashScreen");
  if (!p) {
    var sl = document.getElementById("splashLogo");
    sl.src = "assets/logo.png";
    sl.style.opacity = "1";
    var ll = document.getElementById("loginLogo");
    ll.src = "assets/logo.png";
    ll.style.opacity = "1";
    sp.style.visibility = "visible";
    return;
  }
  window._urlClientCode = p;
  var oldCode = localStorage.getItem("medersa_client_code");
  if (oldCode && oldCode !== p) {
    localStorage.removeItem("medersa_settings");
    localStorage.removeItem("medersa_client_config");
    localStorage.removeItem("medersa_client_code");
    sessionStorage.removeItem("medersa_logged_in");
  }
  fetch("clients/" + encodeURIComponent(p) + ".json")
    .then(function(r){ return r.ok ? r.json() : Promise.reject(); })
    .then(function(cfg){
      var sLogo = document.getElementById("splashLogo");
      var lLogo = document.getElementById("loginLogo");
      var logoSrc = (cfg.logo && cfg.logo !== "assets/logo.png") ? cfg.logo : "assets/logo.png";
      sLogo.onload = function(){ sLogo.style.opacity = "1"; };
      lLogo.onload = function(){ lLogo.style.opacity = "1"; };
      sLogo.src = logoSrc;
      lLogo.src = logoSrc;
      if (cfg.nomAr) document.getElementById("splashNameAr").textContent = cfg.nomAr;
      if (cfg.nomFr) document.getElementById("splashNameFr").textContent = cfg.nomFr;
      if (cfg.couleurPrincipale) document.documentElement.style.setProperty("--primary", cfg.couleurPrincipale);
      if (cfg.couleurSecondaire) document.documentElement.style.setProperty("--secondary", cfg.couleurSecondaire);
      if (cfg.couleurAccent) document.documentElement.style.setProperty("--accent", cfg.couleurAccent);
      var icon = cfg.logo || "assets/icon-192.png";
      var manifest = {
        name: (cfg.nomFr || "Médersa") + " — " + (cfg.nomAr || ""),
        short_name: cfg.nomFr || "Médersa",
        description: "Gestion — " + (cfg.nomFr || "Médersa"),
        start_url: "./index.html?c=" + encodeURIComponent(p),
        scope: "./",
        display: "standalone",
        orientation: "portrait",
        background_color: "#f4f6f5",
        theme_color: cfg.couleurPrincipale || "#0d7a3d",
        icons: [
          { src: icon, sizes: "192x192", type: "image/png", purpose: "any maskable" },
          { src: icon, sizes: "512x512", type: "image/png", purpose: "any maskable" }
        ]
      };
      var blob = new Blob([JSON.stringify(manifest)], {type: "application/json"});
      document.querySelector('link[rel="manifest"]').href = URL.createObjectURL(blob);
      if (cfg.couleurPrincipale) document.querySelector('meta[name="theme-color"]').content = cfg.couleurPrincipale;
      window._brandingApplied = true;
      sp.style.visibility = "visible";
    })
    .catch(function(){ sp.style.visibility = "visible"; });
})();
</script>

  <!-- Modale modification élève -->

        <input type="text" id="editStudentNom">
      </div>
      <div class="field">
        <label data-i18n="label_tel_eleve_short"></label>
        <input type="tel" id="editStudentTel">
      </div>
      <div class="field">
        <label data-i18n="label_tel_parent_short"></label>
        <input type="tel" id="editStudentTelParent">
      </div>
      <div class="field">
        <label data-i18n="label_classe"></label>
        <select id="editStudentClasse"></select>
